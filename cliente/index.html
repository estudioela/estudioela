<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>Área do Cliente | Elã</title>
    
    <link rel="icon" href="/assets/favicon-ela.webp" type="image/webp"/>
    <link rel="stylesheet" href="https://use.typekit.net/piy8ljr.css"/>

    <style>
        :root {
            --bg: #f3f3f3; --card: #ffffff; --text: #1f1f1f; --muted: #666666;
            --line: rgba(205,0,5,.16); --accent: #cd0005; --accent-dark: #a80004;
            --status-ok: #274f19; --status-drive: #602f9c; --status-warn: #f0913d; --status-aberto: #8a8a8a;
        }

        * { box-sizing: border-box; }
        body { font-family: "acumin-pro", sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; text-transform: lowercase; }
        a { text-decoration: none; color: inherit; }

        /* TELA DE LOGIN */
        #view-login { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .login-box { width: 100%; max-width: 340px; text-align: center; }
        .login-logo { width: 90px; margin-bottom: 40px; filter: brightness(0) invert(1); }
        .login-box h1 { font-family: "ivypresto-display", serif; color: var(--card); font-size: 36px; margin-bottom: 30px; font-weight: 300; }
        .form-cliente { display: flex; flex-direction: column; gap: 16px; }
        .form-cliente input { width: 100%; height: 52px; border-radius: 26px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: var(--card); padding: 0 24px; font-family: inherit; font-size: 15px; outline: none; transition: border-color 0.3s; }
        .form-cliente input::placeholder { color: rgba(255,255,255,0.6); }
        .form-cliente input:focus { border-color: var(--card); }
        .btn-cliente { height: 52px; border-radius: 26px; border: none; background: var(--card); color: var(--accent); font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform 0.3s; margin-top: 8px; }
        .btn-cliente:hover { transform: translateY(-2px); }
        .btn-cliente:disabled { opacity: 0.7; cursor: not-allowed; }
        .erro-msg { color: #ffb3b3; font-size: 13px; margin-top: -8px; display: none; }

        /* PORTAL */
        #view-portal { display: none; min-height: 100vh; }
        .header { background: var(--card); border-bottom: 1px solid var(--line); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-logo { height: 32px; filter: brightness(0) saturate(100%) invert(13%) sepia(93%) saturate(6001%) hue-rotate(348deg) brightness(88%) contrast(114%); }
        .nav { display: flex; justify-content: center; gap: 12px; padding: 24px 20px; overflow-x: auto; }
        .nav button { background: var(--card); border: 1px solid var(--line); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
        .nav button:hover, .nav button.active { color: var(--card); background: var(--accent); border-color: var(--accent); }
        .container { max-width: 1026px; margin: 0 auto 60px auto; padding: 0 20px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .card-padrao { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; gap: 16px; }
        .card-title { font-size: 16px; font-weight: 700; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; color: #ffffff; }

        /* CALENDÁRIO */
        .cal-wrapper { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
        .cal-controls { display: flex; justify-content: space-between; align-items: center; padding: 20px; font-size: 24px; color: var(--accent); }
        .mes-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--line); }
        .dia-header { background: var(--card); text-align: center; font-size: 12px; color: var(--muted); font-weight: 600; padding: 12px 0; }
        .cal-cell { background: var(--card); min-height: 120px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .cal-date { font-size: 14px; font-weight: 700; color: var(--muted); }
        .cal-date.hoje { color: var(--accent); }
        .cal-tag { position: relative; padding: 6px; border-radius: 6px; color: #ffffff; font-size: 11px; font-weight: 600; cursor: pointer; }
        .tooltip { visibility: hidden; opacity: 0; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #1f1f1f; color: #fff; padding: 8px; border-radius: 6px; font-size: 11px; z-index: 10; transition: 0.2s; min-width: 120px; }
        .cal-tag:hover .tooltip { visibility: visible; opacity: 1; }

        #loading-screen { text-align: center; padding: 80px 20px; display: none; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--line); border-radius: 50%; border-top-color: var(--accent); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="view-login">
        <div class="login-box">
            <img src="/assets/logo-ela.svg" alt="Elã" class="login-logo">
            <h1>área do cliente</h1>
            <form id="login-form" class="form-cliente">
                <input type="text" id="username" placeholder="@ do instagram" required autocomplete="off">
                <input type="password" id="password" placeholder="senha" required>
                <p id="erro-login" class="erro-msg">usuário ou senha incorretos.</p>
                <button type="submit" id="btn-login" class="btn-cliente">acessar portal</button>
            </form>
        </div>
    </div>

    <div id="view-portal">
        <div class="header">
            <img src="/assets/logo-ela.svg" alt="Elã" class="header-logo">
            <button onclick="sair()" style="background:none; border:none; cursor:pointer; color:var(--muted)">sair</button>
        </div>

        <div class="nav">
            <button class="active" onclick="showTab('tab-calendario', this)">ativações</button>
            <button onclick="showTab('tab-conteudos', this)">pastas</button>
            <button onclick="showTab('tab-diadia', this)">dia a dia</button>
            <button onclick="showTab('tab-pagamentos', this)">financeiro</button>
        </div>

        <div id="loading-screen"><div class="spinner"></div></div>

        <div class="container" id="main-container">
            <div id="tab-calendario" class="tab-content active">
                <div class="cal-wrapper">
                    <div class="cal-controls">
                        <button onclick="mudarMes(-1)" style="background:none; border:none; color:var(--accent); cursor:pointer">❮</button>
                        <span id="mes-atual"></span>
                        <button onclick="mudarMes(1)" style="background:none; border:none; color:var(--accent); cursor:pointer">❯</button>
                    </div>
                    <div class="mes-grid">
                        <div class="dia-header">dom</div><div class="dia-header">seg</div><div class="dia-header">ter</div>
                        <div class="dia-header">qua</div><div class="dia-header">qui</div><div class="dia-header">sex</div><div class="dia-header">sáb</div>
                    </div>
                    <div class="mes-grid" id="cal-grid"></div>
                </div>
            </div>
            <div id="tab-conteudos" class="tab-content"><div class="grid-cards" id="lista-pastas"></div></div>
            <div id="tab-diadia" class="tab-content"><div class="grid-cards" id="lista-diadia"></div></div>
            <div id="tab-pagamentos" class="tab-content"><div class="grid-cards" id="lista-pagamentos"></div></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyKR3RT24xuez5XcQk5X4OzE9XZ9owzUUmpQwUNYjzziXxoDrHSOAy9xUiQxiWa4ZyzAA/exec";
        let sessionPlanilhaId = null;
        let globalData = null;
        let dataCalendario = new Date();
        dataCalendario.setDate(1);

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const erro = document.getElementById('erro-login');
            btn.disabled = true; btn.innerText = "validando..."; erro.style.display = 'none';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ acao: 'login', usuario: document.getElementById('username').value, senha: document.getElementById('password').value })
                });
                const result = await response.json();
                if (result.sucesso) {
                    sessionPlanilhaId = result.planilhaId;
                    document.getElementById('view-login').style.display = 'none';
                    document.getElementById('view-portal').style.display = 'block';
                    recarregarDados();
                } else {
                    erro.style.display = 'block'; btn.disabled = false; btn.innerText = "acessar portal";
                }
            } catch (err) { alert("erro de conexão."); btn.disabled = false; }
        });

        async function recarregarDados() {
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ acao: 'getDados', planilhaId: sessionPlanilhaId })
                });
                globalData = await response.json();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'block';
                renderTudo();
            } catch (err) { alert("erro ao carregar dados."); }
        }

        function renderTudo() {
            renderCalendario(); renderPastas(); renderDiaAdia(); renderPagamentos();
        }

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(e => e.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
        }

        function normalizeText(str) { return str ? str.toString().toLowerCase().trim() : ""; }

        function getCorStatus(str) {
            let s = normalizeText(str);
            if(s.includes('aprovado') || s.includes('ok')) return "#274f19";
            if(s.includes('drive')) return "#602f9c";
            if(s.includes('altera') || s.includes('ajuste')) return "#f0913d";
            return "#8a8a8a";
        }

        function renderCalendario() {
            const mes = dataCalendario.getMonth(); const ano = dataCalendario.getFullYear();
            const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
            document.getElementById('mes-atual').innerText = `${meses[mes]} ${ano}`;

            let primeiroDia = new Date(ano, mes, 1).getDay();
            let diasNoMes = new Date(ano, mes + 1, 0).getDate();
            let html = '';
            for(let i=0; i<primeiroDia; i++) html += '<div class="cal-cell"></div>';
            
            for(let dia=1; dia<=diasNoMes; dia++) {
                let evs = globalData.datas.filter(d => {
                    let parts = d['ATIVAÇÃO'].split('/');
                    return parts[0] == dia && parts[1] == (mes+1) && parts[2].includes(ano);
                });
                let evHtml = evs.map(e => `<div class="cal-tag" style="background:${getCorStatus(e['CONTEUDO'])}">${normalizeText(e['CONTEUDO'])}<div class="tooltip">${e['INFLU_KEY']}</div></div>`).join('');
                html += `<div class="cal-cell"><div class="cal-date">${dia}</div>${evHtml}</div>`;
            }
            document.getElementById('cal-grid').innerHTML = html;
        }

        function renderPastas() {
            document.getElementById('lista-pastas').innerHTML = globalData.pastas.map(p => `
                <div class="card-padrao">
                    <div class="card-title">${p.nome}</div>
                    <a href="${p.link}" target="_blank" class="btn-cliente" style="display:block; text-align:center; padding:10px; text-decoration:none">abrir drive</a>
                </div>
            `).join('');
        }

        function renderDiaAdia() {
            document.getElementById('lista-diadia').innerHTML = globalData.conteudos.map(c => `
                <div class="card-padrao">
                    <div style="display:flex; justify-content:space-between">
                        <div class="card-title">${c['INFLU_KEY']}</div>
                        <div class="badge" style="background:${getCorStatus(c['STATUS CONTEÚDO'])}">${c['STATUS CONTEÚDO'] || 'em aberto'}</div>
                    </div>
                    <div style="font-size:12px; color:var(--muted)">${c['CONTEUDO']} • ${c['DATA ATIVAÇÃO']}</div>
                </div>
            `).join('');
        }

        function renderPagamentos() {
            document.getElementById('lista-pagamentos').innerHTML = globalData.pagamentos.map(p => `
                <div class="card-padrao">
                    <div style="display:flex; justify-content:space-between">
                        <div class="card-title">${p['INFLU_KEY']}</div>
                        <div class="badge" style="background:${getCorStatus(p['STATUS'])}">${p['STATUS'] || 'pendente'}</div>
                    </div>
                    <div style="font-size:12px">pix: ${p['CHAVE PIX'] || 'não informado'}</div>
                </div>
            `).join('');
        }

        function mudarMes(v) { dataCalendario.setMonth(dataCalendario.getMonth() + v); renderCalendario(); }
        function sair() { location.reload(); }
    </script>
</body>
</html>
