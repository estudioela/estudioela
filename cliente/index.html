<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Área do Cliente | Elã</title>
    
    <link rel="icon" href="/assets/favicon-ela.webp" type="image/webp"/>
    <link rel="stylesheet" href="https://use.typekit.net/piy8ljr.css"/>
    <link rel="stylesheet" href="/assets/styles.css"/>
    
    <style>
        .login-page {
            background-color: var(--accent);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 340px;
            text-align: center;
        }
        .login-logo {
            width: 90px;
            margin-bottom: 40px;
            filter: brightness(0) invert(1);
        }
        .login-box h1 {
            color: var(--bg-white);
            font-size: 36px;
            margin-bottom: 30px;
        }
        .form-cliente {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-cliente input {
            width: 100%;
            height: 52px;
            border-radius: 26px;
            border: 1px solid rgba(255,255,255,0.4);
            background: transparent;
            color: var(--bg-white);
            padding: 0 24px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-cliente input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .form-cliente input:focus {
            border-color: var(--bg-white);
        }
        .btn-cliente {
            height: 52px;
            border-radius: 26px;
            border: none;
            background: var(--bg-white);
            color: var(--accent);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.3s;
            margin-top: 8px;
        }
        .btn-cliente:hover {
            transform: translateY(-2px);
        }
        .voltar-link {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-top: 30px;
            display: inline-block;
            transition: color 0.3s;
        }
        .voltar-link:hover {
            color: var(--bg-white);
        }
    </style>
</head>
<body class="login-page">

    <div class="login-box">
        <a href="/">
            <img src="/assets/logo-ela.svg" alt="Elã" class="login-logo">
        </a>
        <h1 class="title-editorial">área do cliente</h1>
        
        <form id="login-form" class="form-cliente">
            <input type="text" id="username" placeholder="@ do instagram" required>
            <input type="password" id="password" placeholder="senha" required>
            <button type="submit" class="btn-cliente">acessar portal</button>
        </form>
        
        <a href="/" class="voltar-link">voltar para o site</a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // A lógica de conexão com o Apps Script e validação de senha entrará aqui
            console.log('preparando para validar login...');
        });
    </script>

</body>
</html>
